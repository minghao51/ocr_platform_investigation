name: Lint & Format

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

jobs:
  ruff-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install uv
        run: pip install uv

      - name: Install ruff
        working-directory: backend
        run: uv add --dev ruff

      - name: Run ruff check
        working-directory: backend
        run: uv run ruff check . --output-format=github

      - name: Run ruff format check
        working-directory: backend
        run: uv run ruff format . --check --output-format=github

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        run: pip install uv

      - name: Run pip-audit
        working-directory: backend
        run: |
          uvx pip-audit --desc --format=json --output=audit.json || true
          if [ -s audit.json ]; then
            echo "::warning::Vulnerabilities found - see audit.json"
            cat audit.json
          fi

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

  auto-fix:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [ruff-check, frontend-lint]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install uv
        run: pip install uv

      - name: Install ruff
        working-directory: backend
        run: uv add --dev ruff

      - name: Run ruff check --fix
        id: ruff-check-fix
        working-directory: backend
        run: |
          uv run ruff check . --fix --output-format=github
          if [ -n "$(git status --porcelain)" ]; then
            echo "fixed=true" >> $GITHUB_OUTPUT
          else
            echo "fixed=false" >> $GITHUB_OUTPUT
          fi

      - name: Run ruff format
        id: ruff-format-fix
        working-directory: backend
        run: |
          uv run ruff format .
          if [ -n "$(git status --porcelain)" ]; then
            echo "fixed=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.ruff-check-fix.outputs.fixed == 'true' || steps.ruff-format-fix.outputs.fixed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: steps.ruff-check-fix.outputs.fixed == 'true' || steps.ruff-format-fix.outputs.fixed == 'true'
        working-directory: frontend
        run: npm ci

      - name: Run ESLint --fix
        id: eslint-fix
        working-directory: frontend
        run: |
          npx eslint . --ext ts,tsx --fix
          if [ -n "$(git status --porcelain)" ]; then
            echo "fixed=true" >> $GITHUB_OUTPUT
          else
            echo "fixed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create commit for auto-fixes
        if: steps.ruff-check-fix.outputs.fixed == 'true' || steps.ruff-format-fix.outputs.fixed == 'true' || steps.eslint-fix.outputs.fixed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "style: auto-fix lint and format issues

          Auto-generated by GitHub Actions"

      - name: Push changes
        if: steps.ruff-check-fix.outputs.fixed == 'true' || steps.ruff-format-fix.outputs.fixed == 'true' || steps.eslint-fix.outputs.fixed == 'true'
        run: git push

      - name: Comment on PR
        if: steps.ruff-check-fix.outputs.fixed == 'true' || steps.ruff-format-fix.outputs.fixed == 'true' || steps.eslint-fix.outputs.fixed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Lint and format auto-fixes have been committed.'
            })
