services:
  - type: web
    name: ocr-platform
    env: python
    region: oregon
    buildCommand: cd backend && pip install uv && uv sync --frozen --no-dev
    startCommand: cd backend && uv run python -m database.migrations && uv run uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./data/ocr_platform.db
      - key: NEBIUS_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS_STR
        value: https://ocr-platform.onrender.com
    disk:
      enabled: true
      mountPath: /opt/render/project/src/backend/data
      size: 1GB
