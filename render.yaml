services:
  - type: web
    name: ocr-platform
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        value: sqlite:////app/data/ocr_platform.db
      - key: NEBIUS_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS_STR
        value: https://ocr-platform.onrender.com
    disk:
      enabled: true
      mountPath: /app/data
      sizeGB: 1
