services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr_platform
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      # Development volume mounts for hot-reload
      - ./backend:/app/backend
      - ./frontend/src:/app/frontend/src
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
