services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr_platform
    ports:
      - "8001:8000"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
      - ./.env.keys:/app/.env.keys:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
